<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Results</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <main class="site-shell">
        <section class="participant-app admin-app">
            <header class="participant-header admin-header-elegant">
                <div class="title-row" aria-label="Admin title">
                    <img class="title-siren-image" src="/siren.jpeg" alt="" aria-hidden="true" />
                    <h1 class="main-title">Admin Results</h1>
                    <img class="title-siren-image" src="/siren.jpeg" alt="" aria-hidden="true" />
                </div>

                <p class="admin-subtitle">Wedding palette elimination results</p>

                <div class="admin-actions admin-actions-elegant">
                    <button id="refreshBtn" type="button">Refresh</button>
                    <button id="clearBtn" type="button">Clear Results</button>
                </div>
            </header>

            <div id="messageBox" class="message"></div>

            <section id="summarySection" class="admin-summary-grid"></section>

            <section class="admin-section">
                <h2 class="section-title">Final Winner Totals</h2>
                <div id="paletteCounts" class="admin-palette-counts"></div>
            </section>

            <section class="admin-section">
                <h2 class="section-title">Respondents</h2>
                <div id="respondentsContainer" class="admin-respondents-list"></div>
            </section>
        </section>
    </main>

    <script src="/admin.js"></script>
</body>

</html>
